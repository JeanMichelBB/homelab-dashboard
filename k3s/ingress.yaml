apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homelab-dashboard
  namespace: homelab-dashboard
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  rules:
    - host: homelab.sacenpapier.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homelab-frontend
                port:
                  number: 80
    - host: homelabapi.sacenpapier.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homelab-backend
                port:
                  number: 8000
